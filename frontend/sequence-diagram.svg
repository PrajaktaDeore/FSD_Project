<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f3c55" />
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #12384f; }
      .label { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #12384f; }
      .txt { font: 13px 'Segoe UI', Arial, sans-serif; fill: #1b3548; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #3f6077; }
      .lifeline { stroke: #98b3c7; stroke-width: 2; stroke-dasharray: 6 6; }
      .msg { stroke: #1f3c55; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .note { fill: #f3f9ff; stroke: #d4e4f0; }
      .box { fill: #ffffff; stroke: #b8cfdf; }
      .alt { fill: #f7fbf7; stroke: #c7ddc8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1200" fill="#eef6fb"/>
  <text x="800" y="50" text-anchor="middle" class="title">Milkman Website Sequence Diagram</text>

  <rect x="90" y="90" width="170" height="40" class="box" rx="8"/>
  <rect x="370" y="90" width="250" height="40" class="box" rx="8"/>
  <rect x="730" y="90" width="220" height="40" class="box" rx="8"/>
  <rect x="1060" y="90" width="180" height="40" class="box" rx="8"/>
  <rect x="1320" y="90" width="180" height="40" class="box" rx="8"/>

  <text x="175" y="116" text-anchor="middle" class="label">User</text>
  <text x="495" y="116" text-anchor="middle" class="label">React Frontend</text>
  <text x="840" y="116" text-anchor="middle" class="label">LocalStorage</text>
  <text x="1150" y="116" text-anchor="middle" class="label">Customer API</text>
  <text x="1410" y="116" text-anchor="middle" class="label">Staff API</text>

  <line x1="175" y1="130" x2="175" y2="1140" class="lifeline"/>
  <line x1="495" y1="130" x2="495" y2="1140" class="lifeline"/>
  <line x1="840" y1="130" x2="840" y2="1140" class="lifeline"/>
  <line x1="1150" y1="130" x2="1150" y2="1140" class="lifeline"/>
  <line x1="1410" y1="130" x2="1410" y2="1140" class="lifeline"/>

  <line x1="175" y1="170" x2="495" y2="170" class="msg"/>
  <text x="335" y="162" text-anchor="middle" class="txt">Open Home page</text>

  <line x1="495" y1="205" x2="175" y2="205" class="msg"/>
  <text x="335" y="197" text-anchor="middle" class="txt">Render sections &amp; navigation</text>

  <rect x="300" y="230" width="1080" height="145" class="note" rx="8"/>
  <text x="320" y="252" class="label">Registration Flow</text>
  <line x1="175" y1="280" x2="495" y2="280" class="msg"/>
  <text x="335" y="272" text-anchor="middle" class="txt">Submit register form</text>
  <line x1="495" y1="315" x2="1150" y2="315" class="msg"/>
  <text x="822" y="307" text-anchor="middle" class="txt">POST /customer/register/</text>
  <line x1="1150" y1="350" x2="495" y2="350" class="msg"/>
  <text x="822" y="342" text-anchor="middle" class="txt">Success / failure</text>

  <rect x="300" y="395" width="1080" height="220" class="note" rx="8"/>
  <text x="320" y="417" class="label">Login Flow</text>
  <line x1="175" y1="445" x2="495" y2="445" class="msg"/>
  <text x="335" y="437" text-anchor="middle" class="txt">Submit credentials</text>

  <line x1="495" y1="480" x2="1150" y2="480" class="msg"/>
  <text x="822" y="472" text-anchor="middle" class="txt">Customer login API</text>
  <line x1="1150" y1="515" x2="495" y2="515" class="msg"/>
  <text x="822" y="507" text-anchor="middle" class="txt">customerSession</text>
  <line x1="495" y1="550" x2="840" y2="550" class="msg"/>
  <text x="667" y="542" text-anchor="middle" class="txt">Save customerSession</text>

  <line x1="495" y1="585" x2="1410" y2="585" class="msg"/>
  <text x="953" y="577" text-anchor="middle" class="txt">Staff login API (alternate)</text>

  <rect x="300" y="640" width="1080" height="245" class="note" rx="8"/>
  <text x="320" y="662" class="label">Customer Panel / Order Flow</text>
  <line x1="175" y1="690" x2="495" y2="690" class="msg"/>
  <text x="335" y="682" text-anchor="middle" class="txt">Browse products / category / orders</text>
  <line x1="495" y1="725" x2="1150" y2="725" class="msg"/>
  <text x="822" y="717" text-anchor="middle" class="txt">GET products + subscriptions</text>
  <line x1="175" y1="760" x2="495" y2="760" class="msg"/>
  <text x="335" y="752" text-anchor="middle" class="txt">Add item to cart</text>
  <line x1="495" y1="795" x2="840" y2="795" class="msg"/>
  <text x="667" y="787" text-anchor="middle" class="txt">Save customerCart</text>

  <rect x="360" y="820" width="950" height="60" class="alt" rx="8"/>
  <text x="380" y="842" class="small">If not logged in: show login alert + login button</text>
  <text x="380" y="862" class="small">Else: save order, clear cart, show success</text>

  <rect x="300" y="905" width="1080" height="190" class="note" rx="8"/>
  <text x="320" y="927" class="label">Admin CRUD Flow</text>
  <line x1="175" y1="955" x2="495" y2="955" class="msg"/>
  <text x="335" y="947" text-anchor="middle" class="txt">Open admin pages</text>
  <line x1="495" y1="990" x2="1410" y2="990" class="msg"/>
  <text x="953" y="982" text-anchor="middle" class="txt">GET list data</text>
  <line x1="175" y1="1025" x2="495" y2="1025" class="msg"/>
  <text x="335" y="1017" text-anchor="middle" class="txt">Add / Update / Delete</text>
  <line x1="495" y1="1060" x2="1410" y2="1060" class="msg"/>
  <text x="953" y="1052" text-anchor="middle" class="txt">POST / PUT / DELETE + refresh</text>
</svg>
